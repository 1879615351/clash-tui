name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: windows-amd64
            os: windows-latest
            ext: .exe
            archive: zip
          - target: linux-amd64
            os: ubuntu-20.04
            ext: ""
            archive: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust (stable)
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y build-essential pkg-config libssl-dev

      - name: Build (release)
        run: cargo build --release

      - name: Package (Windows zip)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $name = "clash-tui_${{ github.ref_name }}_windows_amd64"
          mkdir $name
          cp target/release/clash-tui.exe $name/
          cp README.md $name/
          Compress-Archive -Path $name -DestinationPath "$name.zip"

      - name: Package (Linux tar.gz)
        if: runner.os == 'Linux'
        run: |
          NAME="clash-tui_${{ github.ref_name }}_linux_amd64"
          mkdir -p "$NAME"
          cp target/release/clash-tui "$NAME/"
          cp README.md "$NAME/"
          tar czf "${NAME}.tar.gz" "$NAME"

      - name: Build .deb (Linux)
        if: runner.os == 'Linux'
        run: |
          NAME="clash-tui"
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          DEB_NAME="${NAME}_${VERSION}_amd64"
          mkdir -p "${DEB_NAME}/DEBIAN"
          mkdir -p "${DEB_NAME}/usr/bin"
          mkdir -p "${DEB_NAME}/usr/share/doc/${NAME}"

          cp target/release/clash-tui "${DEB_NAME}/usr/bin/"
          chmod 755 "${DEB_NAME}/usr/bin/clash-tui"

          cat > "${DEB_NAME}/DEBIAN/control" << CTRL
      Package: ${NAME}
      Version: ${VERSION}
      Section: net
      Priority: optional
      Architecture: amd64
      Maintainer: clash-tui <1879615351@users.noreply.github.com>
      Description: Cross-platform terminal UI for Clash/Mihomo proxy management
       Embedded mihomo v1.18.10 core, 7 TUI tabs, subscription management,
       latency testing, system proxy toggle.
      License: MIT
      Recommends: libssl3
      CTRL

          dpkg-deb --build "${DEB_NAME}"

      - name: Upload artifacts to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            clash-tui_*.*
            *.deb
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
