name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: windows-amd64
            os: windows-latest
            target_dir: target/release
            rust_target: ""
          - target: linux-amd64
            os: ubuntu-22.04
            target_dir: target/x86_64-unknown-linux-musl/release
            rust_target: x86_64-unknown-linux-musl
            arch: amd64
          - target: linux-arm64
            os: ubuntu-22.04
            target_dir: target/aarch64-unknown-linux-musl/release
            rust_target: aarch64-unknown-linux-musl
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust (stable)
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Setup musl targets (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y musl-tools
          rustup target add ${{ matrix.rust_target }}
          # ARM64 needs cross-compiler for C deps (ring crate etc.)
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
            echo "CC_aarch64_unknown_linux_musl=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          fi
        shell: bash

      - name: Build
        shell: bash
        run: |
          if [ -n "${{ matrix.rust_target }}" ]; then
            cargo build --release --target ${{ matrix.rust_target }}
          else
            cargo build --release
          fi

      - name: Package (Linux tar.gz + deb)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -e
          NAME="clash-tui"
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          ARCH="${{ matrix.arch }}"
          BIN="${{ matrix.target_dir }}/clash-tui"

          # tar.gz
          PKG="clash-tui_${{ github.ref_name }}_linux_${ARCH}"
          mkdir -p "${PKG}"
          cp "${BIN}" "${PKG}/"
          cp README.md "${PKG}/"
          tar czf "${PKG}.tar.gz" "${PKG}"

          # .deb
          DEB="${NAME}_${VERSION}_${ARCH}"
          mkdir -p "${DEB}/DEBIAN"
          mkdir -p "${DEB}/usr/bin"
          cp "${BIN}" "${DEB}/usr/bin/"
          chmod 755 "${DEB}/usr/bin/clash-tui"

          printf "Package: %s\nVersion: %s\nSection: net\nPriority: optional\nArchitecture: %s\nMaintainer: clash-tui\nDescription: Clash/Mihomo terminal UI with embedded core\nLicense: MIT\n" \
            "$NAME" "$VERSION" "$ARCH" > "${DEB}/DEBIAN/control"

          dpkg-deb --build "${DEB}"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: >-
            ${{ matrix.target == 'windows-amd64' && 'target/release/clash-tui.exe' || '' }}
            ${{ runner.os == 'Linux' && 'clash-tui_*_linux_*.tar.gz' || '' }}
            ${{ runner.os == 'Linux' && '*.deb' || '' }}
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
