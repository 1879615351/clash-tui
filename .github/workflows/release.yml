name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: windows-amd64
            os: windows-latest
            exe_suffix: .exe
            target_dir: target/release
          - target: linux-amd64
            os: ubuntu-22.04
            exe_suffix: ""
            target_dir: target/x86_64-unknown-linux-musl/release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust (stable)
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Setup musl target (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y musl-tools
          rustup target add x86_64-unknown-linux-musl

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: cargo build --release

      - name: Build (Linux musl)
        if: runner.os == 'Linux'
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Package (Windows zip)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $name = "clash-tui_${{ github.ref_name }}_windows_amd64"
          mkdir $name
          cp ${{ matrix.target_dir }}/clash-tui.exe $name/
          cp README.md $name/
          Compress-Archive -Path $name -DestinationPath "$name.zip"

      - name: Package (Linux tar.gz)
        if: runner.os == 'Linux'
        run: |
          NAME="clash-tui_${{ github.ref_name }}_linux_amd64"
          mkdir -p "$NAME"
          cp ${{ matrix.target_dir }}/clash-tui "$NAME/"
          cp README.md "$NAME/"
          tar czf "${NAME}.tar.gz" "$NAME"

      - name: Build .deb (Linux)
        if: runner.os == 'Linux'
        run: |
          NAME="clash-tui"
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          DEB="${NAME}_${VERSION}_amd64"
          mkdir -p "${DEB}/DEBIAN"
          mkdir -p "${DEB}/usr/bin"
          mkdir -p "${DEB}/usr/share/doc/${NAME}"

          cp ${{ matrix.target_dir }}/clash-tui "${DEB}/usr/bin/"
          chmod 755 "${DEB}/usr/bin/clash-tui"

          printf "Package: %s\nVersion: %s\nSection: net\nPriority: optional\nArchitecture: amd64\nMaintainer: clash-tui\nDescription: Clash/Mihomo terminal UI with embedded core\nLicense: MIT\n" "$NAME" "$VERSION" > "${DEB}/DEBIAN/control"

          dpkg-deb --build "${DEB}"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            clash-tui_*.zip
            clash-tui_*.tar.gz
            *.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
