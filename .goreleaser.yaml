version: 2

before:
  hooks: []

builds:
  - id: clash-tui-windows
    builder: prebuilt
    prebuilt:
      path: target/release/clash-tui.exe
    goos: [windows]
    goarch: [amd64]
    binary: clash-tui

  - id: clash-tui-linux
    builder: prebuilt
    prebuilt:
      path: target/release/clash-tui
    goos: [linux]
    goarch: [amd64]
    binary: clash-tui

archives:
  - id: windows-archive
    builds: [clash-tui-windows]
    formats: ["zip"]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - src: README.md
        dst: .
        strip_parent: true

  - id: linux-archive
    builds: [clash-tui-linux]
    formats: ["tar.gz"]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - src: README.md
        dst: .
        strip_parent: true

nfpms:
  - id: deb
    builds: [clash-tui-linux]
    package_name: clash-tui
    file_name_template: >-
      {{ .PackageName }}_{{ .Version }}_{{ .Arch }}
    vendor: clash-tui
    homepage: https://github.com/1879615351/clash-tui
    maintainer: "clash-tui <1879615351@users.noreply.github.com>"
    description: >-
      Cross-platform terminal UI for Clash/Mihomo proxy management.
      Embedded mihomo v1.18.10 core, 7 TUI tabs, subscription management,
      latency testing, system proxy toggle.
    license: MIT
    formats:
      - deb
    section: net
    priority: optional
    contents:
      - src: target/release/clash-tui
        dst: /usr/bin/clash-tui
        type: file
        file_info:
          mode: 0755
    recommends:
      - libssl3
    deb:
      compression: xz

checksum:
  name_template: checksums.txt

release:
  github:
    owner: 1879615351
    name: clash-tui
  replace_existing_draft: true
  mode: replace
